; PHP.ini - INTENTIONALLY VULNERABLE for testing
; These settings should NEVER be used in production

; CRITICAL: Allow remote file inclusion (RCE)
allow_url_include = On
allow_url_fopen = On

; CRITICAL: Register globals (variable injection)
register_globals = On

; HIGH: Display errors to users
display_errors = On
display_startup_errors = On
error_reporting = E_ALL

; HIGH: Expose PHP version
expose_php = On

; CRITICAL: Dangerous functions enabled
; disable_functions should include: exec, shell_exec, system, passthru, popen, proc_open, eval
disable_functions =

; HIGH: File uploads with large size limit
file_uploads = On
upload_max_filesize = 100M
max_file_uploads = 100

; MEDIUM: Session security weakened
session.cookie_secure = Off
session.cookie_httponly = Off
session.use_only_cookies = Off
session.use_strict_mode = Off

; HIGH: Weak session entropy
session.entropy_length = 0

; MEDIUM: Magic quotes (deprecated but still seen)
magic_quotes_gpc = On

; HIGH: Open basedir not set (allows file traversal)
open_basedir =

; HIGH: Serialization handler using PHP (not encrypted)
session.serialize_handler = php

; CRITICAL: Disable safe mode (deprecated)
safe_mode = Off

; HIGH: Allow eval in assertions
assert.active = On
zend.assertions = 1
