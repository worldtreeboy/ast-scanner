# nginx.conf - INTENTIONALLY VULNERABLE for testing
# These settings should NEVER be used in production

user www-data;
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # HIGH: Server version exposed
    server_tokens on;

    # MEDIUM: Weak SSL/TLS configuration
    ssl_protocols TLSv1 TLSv1.1 TLSv1.2;  # TLSv1 and TLSv1.1 are deprecated
    ssl_ciphers LOW:MEDIUM:HIGH:!aNULL:!MD5;  # Weak ciphers allowed

    server {
        listen 80;
        server_name example.com;

        # HIGH: Directory listing enabled
        autoindex on;

        # CRITICAL: Path traversal via alias misconfiguration
        location /files {
            alias /var/www/uploads/;  # Missing trailing slash = path traversal
        }

        # CRITICAL: SSRF via proxy_pass with user input
        location /proxy {
            # If $arg_url is user-controlled = SSRF
            proxy_pass $arg_url;
        }

        # HIGH: Sensitive files accessible
        location ~ /\.(git|svn|htaccess|env) {
            # Should be: deny all;
        }

        # HIGH: PHP-FPM misconfiguration (code execution)
        location ~ \.php$ {
            # CRITICAL: Allows any file with .php extension
            fastcgi_pass unix:/var/run/php/php-fpm.sock;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
        }

        # MEDIUM: Missing security headers
        # Should include:
        # add_header X-Frame-Options "DENY";
        # add_header X-Content-Type-Options "nosniff";
        # add_header X-XSS-Protection "1; mode=block";
        # add_header Content-Security-Policy "default-src 'self'";

        # HIGH: CORS allow all
        add_header Access-Control-Allow-Origin "*";

        # CRITICAL: Arbitrary file read via try_files
        location /read {
            try_files $uri $uri/ /index.php?file=$uri;
        }
    }
}
