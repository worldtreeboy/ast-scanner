# Spring Boot application.properties - INTENTIONALLY VULNERABLE for testing
# These settings should NEVER be used in production

# CRITICAL: Actuator endpoints exposed without auth
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoint.env.show-values=always

# HIGH: Debug mode enabled
debug=true
logging.level.root=DEBUG

# CRITICAL: Hardcoded database credentials
spring.datasource.url=jdbc:mysql://localhost:3306/myapp
spring.datasource.username=root
spring.datasource.password=P@ssw0rd123!

# HIGH: H2 console enabled (RCE risk)
spring.h2.console.enabled=true
spring.h2.console.settings.web-allow-others=true

# HIGH: DevTools enabled in production
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# CRITICAL: Remote shell enabled (older Spring Boot)
# shell.ssh.enabled=true
# shell.ssh.port=2222

# HIGH: Thymeleaf template caching disabled
spring.thymeleaf.cache=false

# MEDIUM: Show SQL queries
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# HIGH: CORS allow all
# spring.mvc.cors.allowed-origins=*

# CRITICAL: Deserialization whitelist disabled
# spring.redis.serializer=org.springframework.data.redis.serializer.JdkSerializationRedisSerializer

# HIGH: SSL/TLS disabled
server.ssl.enabled=false

# MEDIUM: Server info exposed
server.error.include-stacktrace=always
server.error.include-message=always
server.error.include-binding-errors=always
